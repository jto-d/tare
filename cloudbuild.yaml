steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      [
        'build',
        '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/tare/tare:$COMMIT_SHA',
        '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/tare/tare:latest',
        '.'
      ]

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/tare/tare:$COMMIT_SHA'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/tare/tare:latest'

options:
  logging: CLOUD_LOGGING_ONLY
